<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kochwelt – Kontakt</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <img src="img/logo.png" alt="Kochwelt Logo" />
    </a>
    <button class="nav-toggle" aria-label="Menü öffnen" onclick="this.closest('header').querySelector('nav').classList.toggle('open')">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav>
      <a href="index.html">Start</a>
      <a href="rezept-des-tages.html">Rezept des Tages</a>
      <a href="kontakt.html" class="active">Kontakt</a>
      <a href="impressum.html">Impressum</a>
    </nav>
  </header>

  <!-- KONTAKT FORMULAR -->
  <div class="kontakt-wrapper">
    <div class="kontakt-card">
      <h2>Kontaktiere uns</h2>
      <form action="#" method="post">
        <div class="form-group">
          <label for="name">Dein Name:</label>
          <input type="text" id="name" name="name" placeholder="" />
        </div>
        <div class="form-group">
          <label for="email">Deine E-Mail:</label>
          <input type="email" id="email" name="email" placeholder="" />
        </div>
        <div class="form-group">
          <label for="nachricht">Deine Nachricht:</label>
          <textarea id="nachricht" name="nachricht"></textarea>
        </div>
        <div class="form-submit">
          <button type="submit" class="btn-green">Abschicken</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <a href="index.html" class="logo">
        <img src="img/logo.png" alt="Kochwelt Logo" />
      </a>
      <a href="impressum.html" class="footer-impressum">Impressum</a>
    </div>
    <div class="social-links">
      <a href="https://www.facebook.com/?locale=de_DE" target="_blank" class="social-btn facebook">
        <i class="fa-brands fa-facebook-f"></i>
        <div><span class="find-text">Find us on</span>Facebook</div>
      </a>
      <a href="https://www.instagram.com/" target="_blank" class="social-btn instagram">
        <i class="fa-brands fa-instagram"></i>
        <div><span class="find-text">Follow us on</span>Instagram</div>
      </a>
      <a href="https://x.com/?lang=de" target="_blank" class="social-btn twitter">
        <i class="fa-brands fa-twitter"></i>
        <div><span class="find-text">Follow us on</span>Twitter</div>
      </a>
    </div>
  </footer>

</body>
</html>
